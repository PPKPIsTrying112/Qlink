apiVersion: apps/v1
kind: Deployment
metadata:
  name: qlink-server
spec:
  replicas: 2
  selector:
    matchLabels:
      app: qlink-server
  template:
    metadata:
      labels:
        app: qlink-server
    spec:
      containers:
      - name: qlink-server
        image: SERVER_IMAGE
        ports:
        - containerPort: 3001
        readinessProbe:
          httpGet:
            path: /health
            port: 3001
          initialDelaySeconds: 10
          periodSeconds: 5
        env:
        - name: FIREBASE_PROJECT_ID
          valueFrom:
            secretKeyRef:
              name: server-secrets
              key: FIREBASE_PROJECT_ID
        - name: FIREBASE_CLIENT_EMAIL
          valueFrom:
            secretKeyRef:
              name: server-secrets
              key: FIREBASE_CLIENT_EMAIL
        - name: FIREBASE_PRIVATE_KEY
          valueFrom:
            secretKeyRef:
              name: server-secrets
              key: FIREBASE_PRIVATE_KEY
        - name: GEMINI_API_KEY
          valueFrom:
            secretKeyRef:
              name: server-secrets
              key: GEMINI_API_KEY
        - name: CLIENT_URL
          value: "https://team16.cs144.org"
        - name: PORT
          value: "3001"
---
apiVersion: v1
kind: Service
metadata:
  name: qlink-server-service
spec:
  selector:
    app: qlink-server
  ports:
  - port: 3001
    targetPort: 3001
  type: ClusterIP